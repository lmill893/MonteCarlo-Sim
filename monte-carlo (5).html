<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<body style="margin:0;padding:0;background:#060810">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const GOLD = "#f0c060";
const GREEN = "#4ade80";
const RED = "#f87171";
const CW = 600, CH = 280;

// ── Math helpers ──────────────────────────────────────────────────────────────
function erf(x) {
  const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
  const sign = x < 0 ? -1 : 1; x = Math.abs(x);
  const t = 1/(1+p*x);
  const y = 1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-(x*x));
  return sign*y;
}
function normCDF(x) { return 0.5*(1+erf(x/Math.sqrt(2))); }
function blackScholes(S, K, T, r, sigma, type) {
  if (T <= 0) return type === "call" ? Math.max(S-K,0) : Math.max(K-S,0);
  const d1 = (Math.log(S/K) + (r + 0.5*(sigma**2))*T) / (sigma*Math.sqrt(T));
  const d2 = d1 - sigma*Math.sqrt(T);
  if (type === "call") return S*normCDF(d1) - K*Math.exp(-(r*T))*normCDF(d2);
  return K*Math.exp(-(r*T))*normCDF(-d2) - S*normCDF(-d1);
}
function boxMuller() {
  let u=0,v=0;
  while(u===0) u=Math.random();
  while(v===0) v=Math.random();
  return Math.sqrt((-2)*Math.log(u))*Math.cos(2*Math.PI*v);
}
function runMonteCarlo(S,K,T,r,sigma,n,steps,type) {
  const dt=T/steps; const paths=[]; let sumPayoff=0;
  for(let i=0;i<n;i++){
    let price=S; const path=[price];
    for(let j=0;j<steps;j++){
      const z=boxMuller();
      price*=Math.exp((r-0.5*(sigma**2))*dt+sigma*Math.sqrt(dt)*z);
      path.push(price);
    }
    paths.push(path);
    sumPayoff += type==="call" ? Math.max(price-K,0) : Math.max(K-price,0);
  }
  return { price: Math.exp(-(r*T))*sumPayoff/n, paths };
}

// ── Canvas drawing ────────────────────────────────────────────────────────────
function drawPaths(canvas, paths, S, K, T, type) {
  if(!canvas||!paths.length) return;
  const ctx=canvas.getContext("2d");
  ctx.clearRect(0,0,CW,CH);
  ctx.fillStyle="#080c10"; ctx.fillRect(0,0,CW,CH);
  ctx.strokeStyle="rgba(255,255,255,0.04)"; ctx.lineWidth=1;
  for(let i=0;i<=5;i++){const y=(i/5)*CH;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CW,y);ctx.stroke();}
  for(let i=0;i<=8;i++){const x=(i/8)*CW;ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,CH);ctx.stroke();}
  const steps=paths[0].length-1;
  const allPrices=paths.flat();
  const minP=Math.min(...allPrices)*0.97, maxP=Math.max(...allPrices)*1.03;
  const toX=i=>(i/steps)*CW;
  const toY=p=>CH-((p-minP)/(maxP-minP))*CH*0.92-CH*0.04;
  const ky=toY(K);
  if(ky>=0&&ky<=CH){
    ctx.setLineDash([6,4]); ctx.strokeStyle="rgba(240,192,96,0.5)"; ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(0,ky);ctx.lineTo(CW,ky);ctx.stroke();
    ctx.setLineDash([]);ctx.fillStyle=GOLD;ctx.font="10px Arial";ctx.fillText(`K=${K}`,6,ky-4);
  }
  paths.slice(0,120).forEach(path=>{
    const endPrice=path[path.length-1];
    const itm=type==="call"?endPrice>K:endPrice<K;
    ctx.strokeStyle=itm?"rgba(74,222,128,0.18)":"rgba(248,113,113,0.14)";
    ctx.lineWidth=0.8; ctx.beginPath();
    path.forEach((p,i)=>i===0?ctx.moveTo(toX(i),toY(p)):ctx.lineTo(toX(i),toY(p)));
    ctx.stroke();
  });
  const sy=toY(S);
  ctx.strokeStyle="rgba(255,255,255,0.35)"; ctx.lineWidth=1; ctx.setLineDash([3,5]);
  ctx.beginPath();ctx.moveTo(0,sy);ctx.lineTo(CW,sy);ctx.stroke();
  ctx.setLineDash([]);ctx.fillStyle="rgba(255,255,255,0.6)";ctx.font="10px Arial";ctx.fillText(`S=${S}`,6,sy-4);
  ctx.fillStyle="rgba(255,255,255,0.2)"; ctx.font="9px Arial";
  for(let i=0;i<=4;i++){const p=minP+(maxP-minP)*(i/4);ctx.fillText(p.toFixed(0),CW-36,toY(p)+3);}
}
function drawHistogram(canvas, paths, K, type) {
  if(!canvas||!paths.length) return;
  const ctx=canvas.getContext("2d");
  ctx.clearRect(0,0,CW,120); ctx.fillStyle="#080c10"; ctx.fillRect(0,0,CW,120);
  const finals=paths.map(p=>p[p.length-1]);
  const minF=Math.min(...finals), maxF=Math.max(...finals);
  const bins=60, counts=new Array(bins).fill(0);
  finals.forEach(f=>{const b=Math.min(bins-1,Math.floor(((f-minF)/(maxF-minF))*bins));counts[b]++;});
  const maxCount=Math.max(...counts);
  counts.forEach((c,i)=>{
    const x=(i/bins)*CW, w=CW/bins-1, h=(c/maxCount)*90;
    const mid=minF+(i+0.5)*(maxF-minF)/bins;
    ctx.fillStyle=(type==="call"?mid>K:mid<K)?"rgba(74,222,128,0.7)":"rgba(248,113,113,0.5)";
    ctx.fillRect(x,120-h,w,h);
  });
  const kx=((K-minF)/(maxF-minF))*CW;
  if(kx>=0&&kx<=CW){
    ctx.strokeStyle=GOLD; ctx.lineWidth=1.5; ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(kx,0);ctx.lineTo(kx,120);ctx.stroke();ctx.setLineDash([]);
  }
  ctx.fillStyle="rgba(255,255,255,0.25)"; ctx.font="9px Arial";
  ctx.fillText(minF.toFixed(0),4,115); ctx.fillText(maxF.toFixed(0),CW-28,115);
}

// ── KaTeX formula component ───────────────────────────────────────────────────
function Formula({tex, note}) {
  const ref = useRef(null);
  useEffect(()=>{
    if(ref.current && window.katex){
      try { katex.render(tex, ref.current, {displayMode:true, throwOnError:false}); } catch(e){}
    }
  }, [tex]);
  return (
    <div style={{background:"rgba(255,255,255,0.75)",border:"1px solid rgba(0,0,0,0.1)",borderLeft:"3px solid #f0c060",borderRadius:"0 6px 6px 0",padding:"16px 20px",margin:"14px 0",overflowX:"auto"}}>
      <span ref={ref} style={{color:"#1a2744"}}/>
      {note && <div style={{marginTop:10,fontSize:12,color:"#666",lineHeight:1.6}}>{note}</div>}
    </div>
  );
}

    return {d:`M 40 80 Q ${cx} ${cy} ${ex} ${ey}`, col:ey<80?"rgba(74,180,120,0.55)":"rgba(220,80,80,0.45)"};

      {pts.map(([x,y],i)=>(

function DiagramConvergence() {
  const curvePts=[], abovePts=[], belowPts=[];
  for(let i=1;i<=80;i++){
    const x=50+i*5.2, y=120-95/Math.sqrt(i), se=95/Math.sqrt(i);
    curvePts.push(`${x},${y}`); abovePts.push(`${x},${120-se-8}`); belowPts.push(`${x},${120-se+8}`);
  }
  const markers = [[1,"N=1"],[4,"N=4"],[16,"N=16"],[64,"N=64"]];
  return (
    <svg viewBox="0 0 500 150" style={{width:"100%",background:"#f8f8f8",borderRadius:8,marginBottom:14,border:"1px solid #e0e0e0"}}>
      <defs><marker id="arr2" markerWidth="5" markerHeight="5" refX="2.5" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 Z" fill="#7a6010"/></marker></defs>

      <line x1="45" y1="120" x2="470" y2="120" stroke="#555" strokeWidth="1.5"/>
      <polygon points={[...abovePts,...belowPts.reverse()].join(' ')} fill="rgba(240,192,96,0.15)"/>

  );
}

        <div className={`bookmark-body ${anim}`}>
          <div style={{width:"100%",height:2,background:"linear-gradient(90deg,#f0c060,transparent)",borderRadius:1,marginBottom:2}}/>
          <div style={{fontFamily:"Arial",fontSize:22,fontWeight:800,letterSpacing:"0.08em",color:GOLD,lineHeight:1,textAlign:"center"}}>MONTE<br/>CARLO</div>
          <div style={{fontFamily:"Arial",fontSize:9,letterSpacing:"0.2em",color:"rgba(200,216,232,0.3)",textAlign:"center"}}>OPTION PRICING ENGINE</div>
          <div style={{width:"100%",height:1,background:"rgba(255,255,255,0.07)"}}/>
          <div style={{display:"flex",flexDirection:"column",gap:6,width:"100%"}}>
            <button className={`tab-btn ${tab==="pricer"?"active":""}`} style={{textAlign:"left",padding:"7px 10px",borderRadius:4}} onClick={()=>setTab("pricer")}>PRICER</button>
            <button className={`tab-btn ${tab==="import"?"active":""}`} style={{textAlign:"left",padding:"7px 10px",borderRadius:4}} onClick={()=>setTab("import")}>IMPORT OPTION</button>
            <button className={`tab-btn ${tab==="explainer"?"active":""}`} style={{textAlign:"left",padding:"7px 10px",borderRadius:4}} onClick={()=>setTab("explainer")}>HOW IT WORKS</button>
          </div>
          <div style={{width:"100%",height:1,background:"rgba(255,255,255,0.07)"}}/>
          <div onClick={collapse} style={{fontSize:9,color:"rgba(255,255,255,0.2)",letterSpacing:"0.12em",cursor:"pointer",textAlign:"center"}}>◀ HIDE</div>
        </div>
      )}
      <div className="bookmark-tab" onClick={open?collapse:expand}>
        <span style={{fontSize:11}}>{open?"◀":"▶"}</span>MENU
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
const PRESETS = {
  "ATM Call": {S:100,K:100,T:0.5,r:0.05,sigma:0.2,type:"call"},
  "OTM Put":  {S:100,K:90,T:0.25,r:0.05,sigma:0.25,type:"put"},
  "Deep ITM": {S:120,K:100,T:1,r:0.05,sigma:0.15,type:"call"},
  "High Vol": {S:100,K:100,T:0.5,r:0.03,sigma:0.45,type:"call"},
};

function App() {
  const [tab, setTab] = useState("pricer");
  const [params, setParams] = useState({S:100,K:100,T:0.5,r:0.05,sigma:0.2,type:"call",n:500,steps:50});
  const [result, setResult] = useState(null);
  const [running, setRunning] = useState(false);
  const pathRef = useRef(null), histRef = useRef(null);

  // ── yfinance state ────────────────────────────────────────────────────────
  const [yfTicker, setYfTicker] = useState("AAPL");
  const [yfStatus, setYfStatus] = useState("idle"); // idle | loading | ok | error
  const [yfError, setYfError] = useState("");
  const [yfStock, setYfStock] = useState(null);
  const [yfChain, setYfChain] = useState(null);
  const [yfExpiries, setYfExpiries] = useState([]);
  const [yfSelectedExpiry, setYfSelectedExpiry] = useState("");
  const [yfOptType, setYfOptType] = useState("calls");
  const [yfSelectedOption, setYfSelectedOption] = useState(null);
  const [showSetup, setShowSetup] = useState(false);
  const [apiUrl, setApiUrl] = useState("http://localhost:5000");
  const API = apiUrl.replace(/\/$/, ""); // strip trailing slash

  const safeJson = async (res) => {
    const text = await res.text();
    if (!text || text.trim() === "") throw new Error("Server returned an empty response. Check your Railway deployment logs.");
    try {
      return JSON.parse(text);
    } catch(e) {
      // Server returned HTML (e.g. Railway error page) — show a useful message
      const snippet = text.replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").trim().slice(0, 200);
      throw new Error(`Server returned non-JSON: "${snippet}"`);
    }
  };

  const fetchStock = async (ticker) => {
    setYfStatus("loading"); setYfError(""); setYfChain(null); setYfSelectedOption(null);
    try {
      const [stockRes, volRes] = await Promise.all([
        fetch(`${API}/api/stock?ticker=${ticker}`),
        fetch(`${API}/api/volatility?ticker=${ticker}`)
      ]);
      const stockData = await safeJson(stockRes);
      const volData   = await safeJson(volRes);
      if (stockData.error) throw new Error(stockData.error);
      const combined = { ...stockData, annualVol: volData.annualVol || stockData.sigma };
      setYfStock(combined);
      setYfStatus("ok");
      return combined;
    } catch(e) {
      const msg = e.message;
      if (msg.includes("Failed to fetch") || msg.includes("NetworkError") || msg.includes("CORS")) {
        setYfError("Cannot reach server. If using Railway, make sure the URL is correct and the deployment is active. If running locally, make sure server.py is running.");
      } else {
        setYfError(msg);
      }
      setYfStatus("error");
      return null;
    }
  };

  const fetchChain = async (ticker, expiry, type) => {
    setYfStatus("loading"); setYfChain(null); setYfSelectedOption(null);
    try {
      const url = `${API}/api/options?ticker=${ticker}&type=${type}${expiry ? `&expiry=${expiry}` : ""}`;
      const res  = await fetch(url);
      const data = await safeJson(res);
      if (data.error) throw new Error(data.error);
      setYfChain(data);
      setYfExpiries(data.expiries || []);
      setYfSelectedExpiry(data.expiry);
      setYfStatus("ok");
    } catch(e) {
      const msg = e.message;
      if (msg.includes("Failed to fetch") || msg.includes("NetworkError") || msg.includes("CORS")) {
        setYfError("Cannot reach server. If using Railway, make sure the URL is correct and the deployment is active.");
      } else {
        setYfError(msg);
      }
      setYfStatus("error");
    }
  };

  const importOption = (opt) => {
    if (!yfStock || !yfChain) return;
    const now = new Date();
    const exp = new Date(yfChain.expiry);
    const T = Math.max(0.01, (exp - now) / (365.25 * 24 * 3600 * 1000));
    const sigma = opt.impliedVol > 0.01 ? opt.impliedVol : (yfStock.annualVol || 0.25);
    setParams(p => ({
      ...p,
      S: yfStock.price,
      K: opt.strike,
      T: parseFloat(T.toFixed(3)),
      sigma: parseFloat(sigma.toFixed(4)),
      type: yfOptType === "calls" ? "call" : "put",
    }));
    setYfSelectedOption(opt);
    setTab("pricer");
    setTimeout(run, 80);
  };

  const set = (k,v) => setParams(p=>({...p,[k]:v}));

  const run = useCallback(() => {
    setRunning(true);
    setTimeout(()=>{
      const {S,K,T,r,sigma,n,steps,type} = params;
      const {price,paths} = runMonteCarlo(S,K,T,r,sigma,n,steps,type);
      const bs = blackScholes(S,K,T,r,sigma,type);
      const finals = paths.map(p=>p[p.length-1]);
      const sorted = [...finals].sort((a,b)=>a-b);
      const var95 = sorted[Math.floor(sorted.length*0.05)];
      const mean = finals.reduce((a,b)=>a+b,0)/finals.length;
      const std = Math.sqrt(finals.reduce((a,b)=>a+(b-mean)**2,0)/finals.length);
      setResult({price,bs,var95,mean,std,paths});
      drawPaths(pathRef.current,paths,S,K,T,type);
      drawHistogram(histRef.current,paths,K,type);
      setRunning(false);
    },20);
  },[params]);

  useEffect(()=>{run();},[]);

  const applyPreset = name => { const p=PRESETS[name]; setParams(prev=>({...prev,...p})); setTimeout(run,50); };
  const err = result ? Math.abs(result.price-result.bs) : null;

  const sliders = [
    {key:"S",label:"SPOT PRICE",min:50,max:200,step:1,fmt:v=>`$${v}`},
    {key:"K",label:"STRIKE PRICE",min:50,max:200,step:1,fmt:v=>`$${v}`},
    {key:"T",label:"TIME TO EXPIRY",min:0.05,max:2,step:0.05,fmt:v=>`${v.toFixed(2)}y`},
    {key:"r",label:"RISK-FREE RATE",min:0,max:0.15,step:0.005,fmt:v=>`${(v*100).toFixed(1)}%`},
    {key:"sigma",label:"VOLATILITY (σ)",min:0.05,max:0.8,step:0.01,fmt:v=>`${(v*100).toFixed(0)}%`},
    {key:"n",label:"SIMULATIONS",min:100,max:5000,step:100,fmt:v=>v.toLocaleString()},
    {key:"steps",label:"TIME STEPS",min:10,max:200,step:10,fmt:v=>v},
  ];

  return (
    <div style={{minHeight:"100vh",background:"#060810",color:"#c8d8e8",fontFamily:"Arial,sans-serif",display:"flex",flexDirection:"column",alignItems:"center",padding:"28px 16px 40px"}}>
      <style>{`
        *{box-sizing:border-box}

        .label{font-size:10px;color:rgba(200,216,232,0.4);letter-spacing:0.12em;margin-bottom:4px}
        input[type=range]{-webkit-appearance:none;height:2px;background:rgba(255,255,255,0.12);border-radius:2px;outline:none;width:100%}
        input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#f0c060;cursor:pointer}
        .run-btn{background:linear-gradient(135deg,#1a2a1a,#0f1f0f);border:1px solid rgba(74,222,128,0.4);color:#4ade80;border-radius:6px;padding:10px 28px;font-family:Arial;font-size:12px;letter-spacing:0.12em;cursor:pointer;transition:all 0.2s}
        .run-btn:hover{background:rgba(74,222,128,0.12);border-color:#4ade80}
        .run-btn:disabled{opacity:0.4;cursor:default}
        .preset-btn{background:transparent;border:1px solid rgba(255,255,255,0.1);color:rgba(200,216,232,0.6);border-radius:4px;padding:5px 12px;font-family:Arial;font-size:10px;letter-spacing:0.08em;cursor:pointer;transition:all 0.15s}
        .preset-btn:hover{border-color:#f0c060;color:#f0c060}
        .type-btn{background:transparent;border:1px solid rgba(255,255,255,0.1);color:rgba(200,216,232,0.5);border-radius:4px;padding:6px 18px;font-family:Arial;font-size:11px;cursor:pointer;transition:all 0.15s}
        .type-btn.ac{border-color:#4ade80;color:#4ade80;background:rgba(74,222,128,0.08)}
        .type-btn.ap{border-color:#f87171;color:#f87171;background:rgba(248,113,113,0.08)}
        .stat-box{background:#0d1218;border:1px solid rgba(255,255,255,0.06);border-radius:6px;padding:12px 16px;min-width:130px}
        .big-num{font-size:22px;font-weight:500;letter-spacing:-0.02em}
        .tab-btn{background:transparent;border:none;border-bottom:2px solid transparent;color:rgba(200,216,232,0.35);padding:10px 24px;font-family:Arial;font-size:11px;letter-spacing:0.14em;cursor:pointer;transition:all 0.18s}
        .tab-btn:hover{color:rgba(200,216,232,0.7)}
        .tab-btn.active{color:#f0c060;border-bottom-color:#f0c060}
        .explainer-wrap{width:100%;background:#fff}
        .explainer-inner{width:100%;max-width:780px;margin:0 auto;padding:32px 24px 48px}
        .explainer-section{margin-bottom:40px}
        .explainer-section h2{font-family:Arial;font-weight:700;font-size:22px;letter-spacing:0.06em;color:#1a1a1a;margin:0 0 14px 0;border-bottom:2px solid rgba(0,0,0,0.08);padding-bottom:8px}
        .explainer-section p{font-size:15px;line-height:1.9;color:#2a2a2a;margin:0 0 14px 0}
        .explainer-section strong{color:#111;font-weight:700}
        .note{font-size:13px;color:#555;border-left:3px solid rgba(180,140,40,0.5);background:rgba(255,255,255,0.55);padding:10px 14px;margin:14px 0;line-height:1.75;border-radius:0 4px 4px 0}
        .two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:16px 0}
        @media(max-width:600px){.two-col{grid-template-columns:1fr}}
        .info-card{background:rgba(255,255,255,0.7);border:1px solid rgba(0,0,0,0.09);border-radius:6px;padding:14px 16px}
        .info-card .card-title{font-size:11px;letter-spacing:0.12em;font-weight:700;color:#7a6010;margin-bottom:8px}
        .info-card p{font-size:13px;color:#333;line-height:1.75;margin:0}
        @keyframes bm-in{0%{transform:translateX(-100%)}55%{transform:translateX(10px)}75%{transform:translateX(-5px)}88%{transform:translateX(3px)}100%{transform:translateX(0)}}
        @keyframes bm-out{0%{transform:translateX(0)}25%{transform:translateX(12px)}100%{transform:translateX(-100%)}}
        .bm-in{animation:bm-in 0.55s cubic-bezier(0.22,1,0.36,1) forwards}
        .bm-out{animation:bm-out 0.28s cubic-bezier(0.55,0,1,0.45) forwards}
        .bookmark-panel{position:fixed;top:40px;left:0;z-index:100;display:flex;align-items:flex-start;pointer-events:none}
        .bookmark-body{pointer-events:all;background:#0b0f18;border:1px solid rgba(255,255,255,0.1);border-left:none;border-radius:0 10px 10px 0;padding:22px 24px 20px;display:flex;flex-direction:column;align-items:center;gap:14px;box-shadow:4px 4px 32px rgba(0,0,0,0.6);min-width:180px}
        .bookmark-tab{pointer-events:all;writing-mode:vertical-rl;text-orientation:mixed;transform:rotate(180deg);background:#0b0f18;border:1px solid rgba(255,255,255,0.1);border-left:none;border-radius:0 6px 6px 0;padding:14px 8px;cursor:pointer;font-size:9px;letter-spacing:0.16em;color:rgba(200,216,232,0.3);transition:color 0.2s,background 0.2s;user-select:none;box-shadow:3px 0 16px rgba(0,0,0,0.4);display:flex;align-items:center;gap:6px;margin-top:12px}
        .bookmark-tab:hover{color:rgba(200,216,232,0.7);background:#131820}
      `}</style>

      <HeaderDrawer tab={tab} setTab={setTab}/>

      {tab==="pricer" && <>
        <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap",justifyContent:"center"}}>
          {Object.keys(PRESETS).map(name=><button key={name} className="preset-btn" onClick={()=>applyPreset(name)}>{name}</button>)}
        </div>
        <div style={{display:"flex",gap:16,width:"100%",maxWidth:900,flexWrap:"wrap",justifyContent:"center"}}>
          <div className="panel" style={{padding:"20px",width:220,flexShrink:0}}>
            <div style={{marginBottom:18}}>
              <div className="label">OPTION TYPE</div>
              <div style={{display:"flex",gap:8}}>
                <button className={`type-btn ${params.type==="call"?"ac":""}`} onClick={()=>set("type","call")}>CALL</button>
                <button className={`type-btn ${params.type==="put"?"ap":""}`} onClick={()=>set("type","put")}>PUT</button>
              </div>
            </div>
            {sliders.map(({key,label,min,max,step,fmt})=>(
              <div key={key} style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span className="label">{label}</span>
                  <span style={{fontSize:11,color:GOLD}}>{fmt(params[key])}</span>
                </div>
                <input type="range" min={min} max={max} step={step} value={params[key]} onChange={e=>set(key,parseFloat(e.target.value))}/>
              </div>
            ))}
            <button className="run-btn" style={{width:"100%",marginTop:8}} onClick={run} disabled={running}>
              {running?"RUNNING…":"▶ SIMULATE"}
            </button>
          </div>

          <div style={{flex:1,minWidth:300,display:"flex",flexDirection:"column",gap:12}}>
            {result && (
              <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                <div className="stat-box" style={{borderColor:"rgba(240,192,96,0.3)"}}>
                  <div className="label">MC PRICE</div>
                  <div className="big-num" style={{color:GOLD}}>${result.price.toFixed(4)}</div>
                </div>
                <div className="stat-box">
                  <div className="label">BLACK-SCHOLES</div>
                  <div className="big-num" style={{color:"rgba(200,216,232,0.7)"}}>${result.bs.toFixed(4)}</div>
                </div>
                <div className="stat-box">
                  <div className="label">ERROR vs BS</div>
                  <div className="big-num" style={{color:err<0.05?GREEN:RED}}>${err.toFixed(4)}</div>
                </div>
                <div className="stat-box">
                  <div className="label">5% VaR</div>
                  <div className="big-num" style={{color:RED}}>${result.var95.toFixed(2)}</div>
                </div>
                <div className="stat-box">
                  <div className="label">MEAN Sₜ</div>
                  <div className="big-num" style={{color:"rgba(200,216,232,0.6)"}}>${result.mean.toFixed(2)}</div>

                <div className="stat-box">
                  <div className="label">STD DEV Sₜ</div>

              </div>
            )}

            <div className="panel" style={{overflow:"hidden"}}>
              <div style={{padding:"10px 14px 6px",borderBottom:"1px solid rgba(255,255,255,0.05)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:10,letterSpacing:"0.12em",color:"rgba(200,216,232,0.4)"}}>SIMULATED PRICE PATHS</span>
                <div style={{display:"flex",gap:12,fontSize:9,color:"rgba(200,216,232,0.35)"}}>
                  <span><span style={{color:GREEN}}>■</span> ITM</span>
                  <span><span style={{color:RED}}>■</span> OTM</span>
                  <span style={{color:GOLD}}>— Strike</span>
                </div>
              </div>
              <canvas ref={pathRef} width={CW} height={CH} style={{display:"block",width:"100%",height:"auto"}}/>
            </div>

            <div className="panel" style={{overflow:"hidden"}}>
              <div style={{padding:"10px 14px 6px",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                <span style={{fontSize:10,letterSpacing:"0.12em",color:"rgba(200,216,232,0.4)"}}>TERMINAL PRICE DISTRIBUTION</span>
              </div>
              <canvas ref={histRef} width={CW} height={120} style={{display:"block",width:"100%",height:"auto"}}/>
            </div>

            {result && (()=>{
              const {S,K,T,r,sigma} = params;
              if(T<=0) return null;
              const d1=(Math.log(S/K)+(r+0.5*(sigma**2))*T)/(sigma*Math.sqrt(T));
              const d2=d1-sigma*Math.sqrt(T);
              const nd1=normCDF(d1);
              const phi=Math.exp(-(d1**2)/2)/Math.sqrt(2*Math.PI);
              const delta=params.type==="call"?nd1:nd1-1;
              const gamma=phi/(S*sigma*Math.sqrt(T));
              const vega=S*phi*Math.sqrt(T)/100;
              const theta=params.type==="call"
                ?(-S*phi*sigma/(2*Math.sqrt(T))-r*K*Math.exp(-(r*T))*normCDF(d2))/365
                :(-S*phi*sigma/(2*Math.sqrt(T))+r*K*Math.exp(-(r*T))*normCDF(-d2))/365;
              const rho=params.type==="call"
                ?K*T*Math.exp(-(r*T))*normCDF(d2)/100
                :-K*T*Math.exp(-(r*T))*normCDF(-d2)/100;
              const greeks=[
                {name:"Δ DELTA",val:delta.toFixed(4),desc:"price sensitivity"},
                {name:"Γ GAMMA",val:gamma.toFixed(4),desc:"delta sensitivity"},
                {name:"ν VEGA",val:vega.toFixed(4),desc:"per 1% vol move"},
                {name:"Θ THETA",val:theta.toFixed(4),desc:"per day decay"},
                {name:"ρ RHO",val:rho.toFixed(4),desc:"per 1% rate move"},

              return (

                        <div style={{fontSize:9,color:"rgba(200,216,232,0.3)"}}>{g.desc}</div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })()}
          </div>

        <div style={{marginTop:24,fontSize:9,color:"rgba(200,216,232,0.15)",letterSpacing:"0.1em",textAlign:"center"}}>

        </div>
      </>}

      {tab==="import" && (
        <div style={{width:"100%",maxWidth:860,display:"flex",flexDirection:"column",gap:16}}>

                  color: showSetup ? GOLD : "rgba(200,216,232,0.5)",
                  fontSize:14,fontWeight:700,cursor:"pointer",

                  transition:"all 0.15s", flexShrink:0,

            </div>
            <div style={{fontSize:13,color:"rgba(200,216,232,0.5)",lineHeight:1.6,marginBottom:12}}>
              Fetch live option chains via <strong style={{color:"rgba(200,216,232,0.8)"}}>yfinance</strong>. Requires <code style={{background:"rgba(255,255,255,0.07)",padding:"1px 6px",borderRadius:3,fontSize:12}}>python server.py</code> running locally on port 5000.

              <div className="label" style={{marginBottom:5}}>API URL</div>

                <input
                  value={apiUrl}
                  onChange={e=>setApiUrl(e.target.value)}
                  placeholder="http://localhost:5000  or  https://your-app.railway.app"
                  style={{flex:1,background:"#0d1218",border:"1px solid rgba(255,255,255,0.12)",borderRadius:4,padding:"7px 12px",color:"#c8d8e8",fontFamily:"monospace",fontSize:12,outline:"none"}}
                />
                <button
                  onClick={async()=>{
                    setYfError("");
                    try {
                      const res = await fetch(`${API}/`);
                      const data = await safeJson(res);

                        setYfError("✅ Connected! Server is online.");

                        setYfError("⚠ Server responded but returned unexpected data.");

            <h2>01 · What is Monte Carlo Simulation?</h2>
            <YTCard href="https://www.youtube.com/watch?v=psOYFdx838E" title="What is a Monte Carlo Pricing Model?"/>
            <p>Monte Carlo simulation uses repeated random sampling to estimate outcomes. Instead of one answer, you simulate thousands of possible futures and observe the distribution of results.</p>
            <DiagramPaths/>
            <div className="note">The name comes from the Monte Carlo Casino — a reference to randomness and probability, coined by physicists on the Manhattan Project in the 1940s.</div>
          </div>

          <div className="explainer-section">
            <h2>02 · Geometric Brownian Motion (GBM)</h2>
            <p>Every second, a stock price is being pushed by two forces at once. GBM captures both of them in one equation:</p>

            <Formula tex="dS = \underbrace{\mu S \, dt}_{\text{drift}} + \underbrace{\sigma S \, dW}_{\text{random shock}}" note="dS = the tiny change in price over a tiny slice of time dt"/>

            {/* Annotated breakdown */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,margin:"18px 0"}}>
              <div style={{background:"#fff8e7",border:"1px solid #f0d080",borderRadius:8,padding:"16px"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <span style={{background:"#92400e",color:"#fff",borderRadius:4,padding:"2px 8px",fontSize:12,fontWeight:700,fontFamily:"Georgia,serif"}}>μS dt</span>
                  <span style={{fontSize:12,fontWeight:700,color:"#92400e"}}>THE DRIFT</span>
                </div>
                <div style={{fontSize:14,color:"#444",lineHeight:1.7,marginBottom:8}}>The predictable, steady climb. <strong>μ</strong> is the annualised return, <strong>S</strong> is the current price, <strong>dt</strong> is the time step. Bigger price = bigger drift, because it scales with S.</div>
                <div style={{fontSize:13,color:"#92400e",background:"#fef3c7",borderRadius:4,padding:"8px 10px",lineHeight:1.6}}>💡 μ=10%, stock at $100 → drift adds ~$0.10 per day on average.</div>
              </div>
              <div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:8,padding:"16px"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <span style={{background:"#166534",color:"#fff",borderRadius:4,padding:"2px 8px",fontSize:12,fontWeight:700,fontFamily:"Georgia,serif"}}>σS dW</span>
                  <span style={{fontSize:12,fontWeight:700,color:"#166534"}}>THE RANDOM SHOCK</span>
                </div>
                <div style={{fontSize:14,color:"#444",lineHeight:1.7,marginBottom:8}}><strong>σ</strong> is volatility, <strong>dW</strong> is a random jolt each step. Because shocks scale with S, prices can never go negative — a $10 stock gets tiny shocks, a $1000 stock gets larger ones.</div>
                <div style={{fontSize:13,color:"#166534",background:"#dcfce7",borderRadius:4,padding:"8px 10px",lineHeight:1.6}}>💡 In risk-neutral pricing μ is swapped for r — a maths trick to ensure no-arbitrage pricing.</div>
              </div>
            </div>

            <DiagramGBM/>
          </div>

          <div className="explainer-section">
            <h2>03 · Discretising the Path</h2>
            <p>A computer can't work with infinitely small time steps. So we chop the life of the option into <strong>N slices</strong> (e.g. 50 daily steps for a 50-day option). At each slice, we multiply the current price by an exponential jump:</p>

            <Formula tex="S_{t+1} = S_t \cdot \exp\!\Bigl(\underbrace{\bigl(r - \tfrac{1}{2}\sigma^2\bigr)\,dt}_{\text{drift correction}} + \underbrace{\sigma\sqrt{dt}\,\varepsilon}_{\text{random shock}}\Bigr)" note="ε ~ N(0,1) is a fresh random number drawn at every single step"/>

            {/* Step-by-step breakdown */}
            <div style={{display:"flex",flexDirection:"column",gap:10,margin:"18px 0"}}>
              <div style={{background:"#f8f8ff",border:"1px solid #c7d2fe",borderRadius:8,padding:"16px"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <span style={{background:"#3730a3",color:"#fff",borderRadius:"50%",width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,flexShrink:0}}>①</span>
                  <span style={{fontSize:13,fontWeight:700,color:"#3730a3"}}>WHY exp(…) INSTEAD OF JUST ADDING?</span>
                </div>
                <div style={{fontSize:14,color:"#444",lineHeight:1.7}}>Stock prices are <em>multiplicative</em> — they grow in percentages, not fixed dollar amounts. Using exp() guarantees the price stays positive and compounds correctly, just like how 10% up then 10% down doesn't bring you back to the start.</div>
              </div>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div style={{background:"#fff8e7",border:"1px solid #f0d080",borderRadius:8,padding:"16px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                    <span style={{background:"#92400e",color:"#fff",borderRadius:4,padding:"2px 8px",fontSize:12,fontWeight:700,fontFamily:"Georgia,serif",flexShrink:0}}>(r − ½σ²)dt</span>
                  </div>
                  <div style={{fontSize:12,fontWeight:700,color:"#92400e",marginBottom:6}}>THE DRIFT CORRECTION — the Itô fix</div>
                  <div style={{fontSize:14,color:"#444",lineHeight:1.7,marginBottom:8}}>You'd expect just <em>r·dt</em> for the drift. The <strong>−½σ²</strong> is a correction from Itô's lemma. Without it, simulated paths drift slightly too high on average.</div>
                  <div style={{fontSize:13,color:"#92400e",background:"#fef3c7",borderRadius:4,padding:"8px 10px",lineHeight:1.6}}>💡 Averaging random exponentials is not the same as exponentiating the average.</div>
                </div>

                <div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:8,padding:"16px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                    <span style={{background:"#166534",color:"#fff",borderRadius:4,padding:"2px 8px",fontSize:12,fontWeight:700,fontFamily:"Georgia,serif",flexShrink:0}}>σ√dt · ε</span>
                  </div>
                  <div style={{fontSize:12,fontWeight:700,color:"#166534",marginBottom:6}}>THE RANDOM SHOCK — a new roll of the dice</div>
                  <div style={{fontSize:14,color:"#444",lineHeight:1.7,marginBottom:8}}><strong>ε</strong> is a fresh N(0,1) number each step. <strong>√dt</strong> scales it so annual volatility stays exactly σ — variance grows as the square root of time, not linearly.</div>
                  <div style={{fontSize:13,color:"#166534",background:"#dcfce7",borderRadius:4,padding:"8px 10px",lineHeight:1.6}}>💡 σ=20%, dt=1/252 → daily shock ≈ 1.26% — matching real markets.</div>
                </div>
              </div>
            </div>

            <DiagramSteps/>
          </div>

          <div className="explainer-section">
            <h2>04 · Generating Normal Random Numbers (Box-Muller)</h2>
            <p>Our simulation needs random shocks ε drawn from a bell curve (normal distribution) at every step. But computers can only generate flat, uniform random numbers between 0 and 1. The Box-Muller transform converts two of those into one perfect bell-curve sample:</p>
            <Formula tex="Z = \underbrace{\sqrt{-2\ln U_1}}_{\text{radius}} \cdot \underbrace{\cos(2\pi U_2)}_{\text{direction}}" note="U₁ and U₂ are independent uniform random numbers between 0 and 1. Z comes out exactly N(0,1)."/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,margin:"18px 0"}}>
              <div style={{background:"#f8f8ff",border:"1px solid #c7d2fe",borderRadius:8,padding:"16px"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <span style={{background:"#3730a3",color:"#fff",borderRadius:4,padding:"2px 8px",fontSize:12,fontWeight:700,fontFamily:"Georgia,serif",letterSpacing:"0.03em"}}>√−2 ln U₁</span>
                  <span style={{fontSize:12,fontWeight:700,color:"#3730a3"}}>THE RADIUS</span>
                </div>
                <div style={{fontSize:14,color:"#444",lineHeight:1.7,marginBottom:8}}>Controls how far from zero the result lands. U₁ near 0 produces a large radius (rare outlier); U₁ near 1 produces a small radius (common, central value).</div>
                <div style={{fontSize:13,color:"#3730a3",background:"#e0e7ff",borderRadius:4,padding:"8px 10px",lineHeight:1.6}}>💡 U₁ = 0.5 → radius ≈ 1.18 · · · U₁ = 0.01 → radius ≈ 3.03</div>
              </div>
              <div style={{background:"#fdf4ff",border:"1px solid #e9d5ff",borderRadius:8,padding:"16px"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <span style={{background:"#7c3aed",color:"#fff",borderRadius:4,padding:"2px 8px",fontSize:12,fontWeight:700,fontFamily:"Georgia,serif",letterSpacing:"0.03em"}}>cos(2π U₂)</span>
                  <span style={{fontSize:12,fontWeight:700,color:"#7c3aed"}}>THE DIRECTION</span>
                </div>
                <div style={{fontSize:14,color:"#444",lineHeight:1.7,marginBottom:8}}>U₂ picks a random angle on a full circle. Cosine maps that angle to a value between −1 and +1, deciding whether Z is positive or negative.</div>
                <div style={{fontSize:13,color:"#7c3aed",background:"#f3e8ff",borderRadius:4,padding:"8px 10px",lineHeight:1.6}}>💡 Using a circle ensures the two outputs are perfectly independent with no bias.</div>
              </div>
            </div>
            <DiagramBoxMuller/>
          </div>

          <div className="explainer-section">
            <h2>05 · Option Payoff & Risk-Neutral Pricing</h2>
            <p>Once we have thousands of simulated final prices, we calculate what the option would have paid in each scenario, average all those payoffs, then discount back to today's value:</p>
            <Formula tex="\hat{C} = \underbrace{e^{-rT}}_{\text{① discount}} \cdot \underbrace{\frac{1}{N} \sum_{i=1}^{N}}_{\text{② average}} \underbrace{\max\!\left(S_T^{(i)} - K,\; 0\right)}_{\text{③ payoff per path}}" note="By the Law of Large Numbers, Ĉ converges to the true price C as N → ∞"/>
            <div style={{display:"flex",flexDirection:"column",gap:10,margin:"18px 0"}}>
              <div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:8,padding:"16px"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                  <span style={{background:"#166534",color:"#fff",borderRadius:"50%",width:24,height:24,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,flexShrink:0}}>③</span>
                  <span style={{fontSize:13,fontWeight:700,color:"#166534"}}>max(S_T − K, 0) — THE PAYOFF</span>
                </div>
                <div style={{fontSize:14,color:"#444",lineHeight:1.75,marginBottom:8}}>You only exercise a call if the stock finishes <em>above</em> the strike K. If it doesn't, the option expires worthless. The max(..., 0) captures this — it floors the payoff at zero.</div>
                <div style={{fontSize:13,color:"#166534",background:"#dcfce7",borderRadius:4,padding:"8px 12px",lineHeight:1.6}}>💡 K = $100, stock ends at $115 → payoff = <strong>$15</strong>. Stock ends at $90 → payoff = <strong>$0</strong>.</div>
              </div>
              <div style={{background:"#fff8e7",border:"1px solid #f0d080",borderRadius:8,padding:"16px"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                  <span style={{background:"#92400e",color:"#fff",borderRadius:"50%",width:24,height:24,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,flexShrink:0}}>②</span>
                  <span style={{fontSize:13,fontWeight:700,color:"#92400e"}}>1/N · Σ — THE AVERAGE</span>
                </div>
                <div style={{fontSize:14,color:"#444",lineHeight:1.75,marginBottom:8}}>Sum up every payoff across all N simulations and divide by N. Most paths may pay $0 (out of the money), but a subset will be in the money. Averaging them all together gives a reliable estimate of the true expected payoff.</div>
                <div style={{fontSize:13,color:"#92400e",background:"#fef3c7",borderRadius:4,padding:"8px 12px",lineHeight:1.6}}>💡 N = 500 paths, 210 finish ITM. Average payoff = (sum of all 500 payoffs) ÷ 500, including the 290 zeros.</div>
              </div>
              <div style={{background:"#f8f8ff",border:"1px solid #c7d2fe",borderRadius:8,padding:"16px"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                  <span style={{background:"#3730a3",color:"#fff",borderRadius:"50%",width:24,height:24,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,flexShrink:0}}>①</span>
                  <span style={{fontSize:13,fontWeight:700,color:"#3730a3"}}>e^(−rT) — THE DISCOUNT</span>
                </div>
                <div style={{fontSize:14,color:"#444",lineHeight:1.75,marginBottom:8}}>The payoff happens in the future (at time T). A dollar in the future is worth less than a dollar today. Multiplying by e^(−rT) converts that future average into today's present value.</div>
                <div style={{fontSize:13,color:"#3730a3",background:"#e0e7ff",borderRadius:4,padding:"8px 12px",lineHeight:1.6}}>💡 r = 5%, T = 1 year → discount = e^(−0.05) ≈ 0.951. A $10 future payoff is worth $9.51 today.</div>
              </div>
            </div>
            <DiagramPayoff/>
            <div className="note">Risk-neutral pricing swaps the real expected return μ for the risk-free rate r. It's not a prediction of what the stock will do — it's a mathematical framework that ensures fair, no-arbitrage pricing regardless of your personal views on the market.</div>

          <div className="explainer-section">
            <h2>06 · Convergence and the 1/√N Rule</h2>
            <p>Monte Carlo is never exact — it's an estimate that improves with more simulations. This formula tells you exactly how much error to expect at any given N:</p>
            <Formula tex="\text{SE} = \frac{\overbrace{\sigma_{\text{payoff}}}^{\text{how spread out the payoffs are}}}{\underbrace{\sqrt{N}}_{\text{more paths} \Rightarrow \text{less error}}}" note="SE = standard error — the typical gap between your MC estimate and the true price"/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,margin:"18px 0"}}>

                  <span style={{fontSize:12,fontWeight:700,color:"#92400e"}}>SPREAD OF OUTCOMES</span>
                </div>
                <div style={{fontSize:14,color:"#444",lineHeight:1.7,marginBottom:8}}>The standard deviation of payoffs across all paths. Wide spread (some pay $0, others $30) means noisy estimates. Narrow spread means fast convergence.</div>
                <div style={{fontSize:13,color:"#92400e",background:"#fef3c7",borderRadius:4,padding:"8px 10px",lineHeight:1.6}}>💡 High-volatility options need far more paths to reach the same accuracy as low-vol options.</div>
              </div>
              <div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:8,padding:"16px"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <span style={{background:"#166534",color:"#fff",borderRadius:4,padding:"2px 8px",fontSize:12,fontWeight:700}}>1 / √N</span>
                  <span style={{fontSize:12,fontWeight:700,color:"#166534"}}>THE SLOW SHRINK</span>
                </div>
                <div style={{fontSize:14,color:"#444",lineHeight:1.7,marginBottom:8}}>Error shrinks with the <em>square root</em> of N, not N directly. To halve your error, you need 4× as many paths. One extra decimal of precision costs 100× more computation.</div>
                <div style={{fontSize:13,color:"#166534",background:"#dcfce7",borderRadius:4,padding:"8px 10px",lineHeight:1.6}}>💡 N=100 → SE≈10% · N=400 → SE≈5% · N=10,000 → SE≈1%</div>
              </div>
            </div>
            <DiagramConvergence/>
            <div className="two-col">
              <div className="info-card"><div className="card-title">ANTITHETIC VARIATES</div><p>For every path using shock ε, also simulate −ε. The two paths partially cancel each other's noise, halving variance at zero extra cost.</p></div>

            </div>
          </div>

          <div className="explainer-section">
            <h2>07 · Monte Carlo vs Black-Scholes</h2>
            <YTCard href="https://www.youtube.com/watch?v=ir6oZ3N2hXY" title="Monte Carlo vs Black-Scholes Explained"/>
            <p>For a simple European option, Black-Scholes gives the exact answer in a single formula. Here's what each piece actually means:</p>
            <Formula tex="C = \underbrace{S_0\, N(d_1)}_{\text{① what you gain}} \;-\; \underbrace{K e^{-rT} N(d_2)}_{\text{② what you pay}}" note="The option price is simply what you expect to receive from the stock minus what you expect to pay for it — both probability-weighted and discounted."/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,margin:"18px 0"}}>
              <div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:8,padding:"16px"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <span style={{background:"#166534",color:"#fff",borderRadius:"50%",width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,flexShrink:0}}>①</span>
                  <span style={{fontSize:13,fontWeight:700,color:"#166534"}}>S₀ · N(d₁) — WHAT YOU GAIN</span>
                </div>
                <div style={{fontSize:14,color:"#444",lineHeight:1.7,marginBottom:8}}>S₀ is today's stock price. N(d₁) is the probability-weighted chance you end up receiving the stock. Deep ITM: N(d₁) → 1. Far OTM: N(d₁) → 0.</div>
                <div style={{fontSize:13,color:"#166534",background:"#dcfce7",borderRadius:4,padding:"8px 10px",lineHeight:1.6}}>💡 Think of N(d₁) as a risk-adjusted delta — your expected share of the stock's value.</div>
              </div>
              <div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:8,padding:"16px"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <span style={{background:"#991b1b",color:"#fff",borderRadius:"50%",width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,flexShrink:0}}>②</span>
                  <span style={{fontSize:13,fontWeight:700,color:"#991b1b"}}>K · e^(−rT) · N(d₂) — WHAT YOU PAY</span>
                </div>
                <div style={{fontSize:14,color:"#444",lineHeight:1.7,marginBottom:8}}>K is the strike. e^(−rT) discounts it to present value. N(d₂) is the probability the option finishes ITM and gets exercised. You subtract this cost from the gain above.</div>
                <div style={{fontSize:13,color:"#991b1b",background:"#fee2e2",borderRadius:4,padding:"8px 10px",lineHeight:1.6}}>💡 K=$100, r=5%, T=1yr, N(d₂)=0.6 → cost = $95.12 × 0.6 = <strong>$57.07</strong></div>

              <div style={{fontSize:13,fontWeight:700,color:"#3730a3",marginBottom:10}}>WHAT IS d₁? — THE MONEYNESS SCORE</div>
              <Formula tex="d_1 = \frac{\overbrace{\ln(S_0/K)}^{\text{how ITM you are}} \;+\; \overbrace{(r + \tfrac{1}{2}\sigma^2)\,T}^{\text{expected growth}}}{\underbrace{\sigma\sqrt{T}}_{\text{total uncertainty}}}" note="d₁ is a standardised score. Positive = in the money, negative = out of the money. Bigger σ or T spreads the distribution wider, making d₁ smaller."/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginTop:12}}>

          <div className="explainer-section">
            <h2>08 · The Greeks</h2>
            <p>Greeks measure how sensitively an option's price responds to changes in each input. They are the essential tools for hedging and risk management.</p>
            <DiagramGreeks/>

            {/* Δ Delta */}
            <div style={{background:"#f9f9f9",border:"1px solid #e8e8e8",borderLeft:"4px solid #4ade80",borderRadius:"0 8px 8px 0",padding:"18px 20px",marginBottom:16}}>
              <div style={{display:"flex",alignItems:"baseline",gap:10,marginBottom:8}}>
                <span style={{fontSize:26,fontWeight:800,color:"#16a34a",fontFamily:"Georgia,serif"}}>Δ</span>
                <span style={{fontSize:16,fontWeight:700,color:"#111",letterSpacing:"0.04em"}}>DELTA</span>
                <span style={{fontSize:12,color:"#888",marginLeft:"auto"}}>∂C / ∂S</span>
              </div>
              <p style={{fontSize:15,color:"#2a2a2a",lineHeight:1.8,margin:"0 0 10px"}}>
                How much the option price moves for every <strong>$1 move in the stock price</strong>. Ranges from 0 to 1 for calls, −1 to 0 for puts.
              </p>
              <div style={{background:"#fff",border:"1px solid #d1fae5",borderRadius:6,padding:"12px 16px",fontSize:13,color:"#166534",lineHeight:1.7}}>
                <strong>Example:</strong> You hold a call option with Δ = 0.60 on Apple stock at $150. Apple rises $5 to $155. Your option gains approximately <strong>0.60 × $5 = $3.00</strong> in value. If Apple fell $5, you'd lose ~$3.00. A delta of 0.5 means the option behaves like owning half a share.
              </div>
            </div>

            {/* Γ Gamma */}
            <div style={{background:"#f9f9f9",border:"1px solid #e8e8e8",borderLeft:"4px solid #f87171",borderRadius:"0 8px 8px 0",padding:"18px 20px",marginBottom:16}}>
              <div style={{display:"flex",alignItems:"baseline",gap:10,marginBottom:8}}>
                <span style={{fontSize:26,fontWeight:800,color:"#dc2626",fontFamily:"Georgia,serif"}}>Γ</span>
                <span style={{fontSize:16,fontWeight:700,color:"#111",letterSpacing:"0.04em"}}>GAMMA</span>
                <span style={{fontSize:12,color:"#888",marginLeft:"auto"}}>∂²C / ∂S²</span>
              </div>
              <p style={{fontSize:15,color:"#2a2a2a",lineHeight:1.8,margin:"0 0 10px"}}>
                The <strong>rate of change of delta</strong> itself — how quickly delta accelerates as the stock moves. Highest when the option is at-the-money near expiry.
              </p>
              <div style={{background:"#fff",border:"1px solid #fee2e2",borderRadius:6,padding:"12px 16px",fontSize:13,color:"#991b1b",lineHeight:1.7}}>
                <strong>Example:</strong> Your call has Δ = 0.50 and Γ = 0.08. Apple rises $1. Delta doesn't stay at 0.50 — it increases to approximately <strong>0.50 + 0.08 = 0.58</strong>. If Apple rises another $1, delta climbs again. High gamma means your position is accelerating in your favour — but it also means large losses accelerate on the downside.
              </div>
            </div>

            {/* ν Vega */}
            <div style={{background:"#f9f9f9",border:"1px solid #e8e8e8",borderLeft:"4px solid #a78bfa",borderRadius:"0 8px 8px 0",padding:"18px 20px",marginBottom:16}}>
              <div style={{display:"flex",alignItems:"baseline",gap:10,marginBottom:8}}>
                <span style={{fontSize:26,fontWeight:800,color:"#7c3aed",fontFamily:"Georgia,serif"}}>ν</span>
                <span style={{fontSize:16,fontWeight:700,color:"#111",letterSpacing:"0.04em"}}>VEGA</span>
                <span style={{fontSize:12,color:"#888",marginLeft:"auto"}}>∂C / ∂σ</span>
              </div>
              <p style={{fontSize:15,color:"#2a2a2a",lineHeight:1.8,margin:"0 0 10px"}}>
                How much the option price changes for every <strong>1% increase in implied volatility</strong>. All long options have positive vega — they become more valuable when uncertainty rises.
              </p>
              <div style={{background:"#fff",border:"1px solid #ede9fe",borderRadius:6,padding:"12px 16px",fontSize:13,color:"#5b21b6",lineHeight:1.7}}>
                <strong>Example:</strong> You buy a call option worth $4.00 with ν = 0.15. Earnings are announced tomorrow and implied volatility jumps from 20% to 25% (a +5% move). Your option gains approximately <strong>0.15 × 5 = $0.75</strong>, rising to $4.75 — even if the stock price hasn't moved at all. This is why options are expensive before big announcements.
              </div>
            </div>

            {/* Θ Theta */}
            <div style={{background:"#f9f9f9",border:"1px solid #e8e8e8",borderLeft:"4px solid #f0c060",borderRadius:"0 8px 8px 0",padding:"18px 20px",marginBottom:16}}>
              <div style={{display:"flex",alignItems:"baseline",gap:10,marginBottom:8}}>
                <span style={{fontSize:26,fontWeight:800,color:"#92400e",fontFamily:"Georgia,serif"}}>Θ</span>
                <span style={{fontSize:16,fontWeight:700,color:"#111",letterSpacing:"0.04em"}}>THETA</span>
                <span style={{fontSize:12,color:"#888",marginLeft:"auto"}}>∂C / ∂t</span>
              </div>
              <p style={{fontSize:15,color:"#2a2a2a",lineHeight:1.8,margin:"0 0 10px"}}>
                How much value the option <strong>loses each day</strong> due to time passing, all else equal. Also called "time decay." Always negative for long options — you're in a race against the clock.
              </p>
              <div style={{background:"#fff",border:"1px solid #fef3c7",borderRadius:6,padding:"12px 16px",fontSize:13,color:"#92400e",lineHeight:1.7}}>
                <strong>Example:</strong> You own a call option worth $3.20 with Θ = −0.05. Over the weekend (3 calendar days pass, roughly 2 trading days), your option loses approximately <strong>0.05 × 2 = $0.10</strong>, dropping to ~$3.10 — even if the stock price and volatility are completely unchanged. Theta decay accelerates sharply in the final weeks before expiry.
              </div>
            </div>

            {/* ρ Rho */}
            <div style={{background:"#f9f9f9",border:"1px solid #e8e8e8",borderLeft:"4px solid #67e8f9",borderRadius:"0 8px 8px 0",padding:"18px 20px",marginBottom:16}}>
              <div style={{display:"flex",alignItems:"baseline",gap:10,marginBottom:8}}>
                <span style={{fontSize:26,fontWeight:800,color:"#0e7490",fontFamily:"Georgia,serif"}}>ρ</span>
                <span style={{fontSize:16,fontWeight:700,color:"#111",letterSpacing:"0.04em"}}>RHO</span>
                <span style={{fontSize:12,color:"#888",marginLeft:"auto"}}>∂C / ∂r</span>
              </div>
              <p style={{fontSize:15,color:"#2a2a2a",lineHeight:1.8,margin:"0 0 10px"}}>
                How much the option price changes for every <strong>1% change in the risk-free interest rate</strong>. The least watched Greek in practice — rates move slowly and rho is small for short-dated options.
              </p>
              <div style={{background:"#fff",border:"1px solid #cffafe",borderRadius:6,padding:"12px 16px",fontSize:13,color:"#164e63",lineHeight:1.7}}>
                <strong>Example:</strong> You hold a 1-year call option with ρ = 0.25. The Federal Reserve unexpectedly raises rates by 1% (from 4% to 5%). Your call option gains approximately <strong>$0.25</strong> in value. This happens because higher rates reduce the present value of the strike price you'd pay — making the call slightly more valuable. Put options have negative rho and would lose value in the same scenario.
              </div>
            </div>

            <div className="note">
              <strong>The trader's shorthand:</strong> Long options are long gamma and long vega, but short theta. You pay for the right to benefit from big moves (gamma) and volatility spikes (vega), but time works against you every day (theta). The pricer above shows all five Greeks calculated analytically using Black-Scholes formulas.
            </div>
          </div>

        </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
